<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Practice 2</title>
</head>
<body>
    <h1>Switch Statement</h1>

    <button class="btn btn-info" onclick="team(Rank)">Rank</button>
    <script>
        Let team = "Yellow"; //string

        switch(team){
            case "Yellow":
                alert("Go Yellow Tigers!");
                break;
            case "Blue":
                alert("Go Blue Bears!");
                break;
            case "Green":
                alert("Go Green Hornets!");
                break;
            case "Red":
                alert("Go Red Bulldogs!");
                break;
            default:
                alert("Team could not be determined.");
        }
    </script>
    
</body>
</html>
